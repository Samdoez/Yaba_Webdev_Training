<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="feedback.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <section class="cont flex">
        <div class="card pad">
            <div class="icon flex">
                <span class="material-icons"> star </span>
            </div>

            <div class="heading">
                <h3>How did we do ?</h3>
                <p>Please let us know how we did, with your support
                and feedback. All feedback is 
                appreciated! to help us improve our services.
                </p>
            </div>
            
            <div class="rating flex">
                <div class="num flex">1</div>
                <div class="num flex">2</div>
                <div class="num flex">3</div>
                <div class="num flex">4</div>
                <div class="num flex">5</div>
            </div>

            <a href="secondpage.html" class="link">
                <div class="submit flex">
                    <p>Submit</p>
                </div>
            </a>
        </div>
    </section>
</body>
</html>
